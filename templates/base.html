{% load static %}
<!DOCTYPE html> 
<html lang="zh-Hant"> 
<head> 
    <meta charset="UTF-8"> 
    <title>{% block title %}圖書館管理系統{% endblock %}</title> 
    <link rel="stylesheet" href="{% static 'css/base_style.css' %}">
</head> 
<body> 
    <header> 
        <h1><a href="/index/">圖書館管理系統</a></h1> 
        <nav> 
            {% if user.is_authenticated %} 
                <span>{{ user.username }}</span> 
                <a href="/my_loans/">個人借閱資訊</a> 
                <a href="/search/">書籍查找</a> 
                <a href="/logout/">登出</a> 
            {% else %} 
                <a href="/login/">會員登入</a> 
                <a href="/register/">會員申請</a> 
                <a href="/search/">書籍查找</a> 
            {% endif %} 
        </nav> 
    </header> 
  
    <main> 
        {% block content %}{% endblock %}
    </main> 
</body>          
</html>
