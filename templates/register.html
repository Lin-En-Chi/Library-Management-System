{% extends 'base.html' %} 
{% load static %}
  
{% block title %}會員申請{% endblock %} 
  
{% block content %} 
<link rel="stylesheet" href="{% static 'css/login_and_registor_style.css' %}">

<div class="container">
    <div class="item auth-card">
        <h2>會員申請</h2> 
    
        <form method="post" action="/register/">
            {% csrf_token %}

            <br>
            <div class="form-row">
                <label>帳號：</label>
                <input name="username" type="text" required>
            </div>

            <div class="form-row">
                <label>密碼：</label>
                <input name="password" type="password" required>
            </div>

            <div class="form-row">
                <label>密碼確認：</label>
                <input name="password2" type="password" required>
            </div>

            <div class="form-row">
                <label>Email（選填）：</label>
                <input name="email" type="email">
            </div>

            <div class="form-row">
                <label>電話（選填）：</label>
                <input name="phone" type="text">
            </div>

            <br>

            <button type="submit">申請</button>
            <br><br>
            <a href="/index/" class="btn">回上頁</a>
        </form>
        
        {% if message %}<p>{{ message }}</p>{% endif %} 
    </div>
</div>
{% endblock %}
